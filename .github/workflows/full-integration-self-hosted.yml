name: Full Integration (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      owner:
        description: "owner value for create_job"
        required: false
        default: "ci"
      env_file:
        description: "env file path (optional, defaults inside script)"
        required: false
        default: ""
      ci_profile:
        description: "ci profile to run"
        required: false
        default: "Full"
      run_full_integration:
        description: "run smoke + fallback integration checks (requires SQL Server and local services prerequisites)"
        required: false
        default: "false"
  schedule:
    - cron: "0 18 * * *"

jobs:
  full-check:
    runs-on:
      - self-hosted
      - windows
    steps:
      - name: Prepare workspace from local mirror
        shell: powershell
        working-directory: ${{ runner.workspace }}
        run: |
          $source = "D:\AIWF"
          $dest = $env:GITHUB_WORKSPACE
          $normalizedDest = [System.IO.Path]::GetFullPath($dest)
          $sha = "${{ github.sha }}"

          if (-not (Test-Path (Join-Path $source ".git"))) {
            throw "Local mirror not found: $source"
          }

          function Stop-PortListeners([int[]]$Ports) {
            foreach ($port in $Ports) {
              $listeners = Get-NetTCPConnection -LocalPort $port -State Listen -ErrorAction SilentlyContinue
              foreach ($listener in $listeners) {
                try {
                  taskkill /F /T /PID $listener.OwningProcess | Out-Null
                  Write-Host ("Stopped lingering port listener pid={0} port={1}" -f $listener.OwningProcess, $port)
                } catch {
                  Write-Host ("[WARN] Failed stopping lingering port listener pid={0} port={1}: {2}" -f $listener.OwningProcess, $port, $_.Exception.Message)
                }
              }
            }
          }

          function Stop-WorkspaceProcesses([string]$WorkspaceRoot) {
            $workspacePrefix = ([System.IO.Path]::GetFullPath($WorkspaceRoot)).TrimEnd("\")
            $escapedPrefix = [Regex]::Escape($workspacePrefix)
            $matches = Get-CimInstance Win32_Process -ErrorAction SilentlyContinue | Where-Object {
              $_.ProcessId -ne $PID -and (
                ($_.ExecutablePath -and ([System.IO.Path]::GetFullPath($_.ExecutablePath)).StartsWith($workspacePrefix, [System.StringComparison]::OrdinalIgnoreCase)) -or
                ($_.CommandLine -and (($_.CommandLine -replace "/", "\") -match $escapedPrefix))
              )
            }

            foreach ($proc in @($matches | Sort-Object ProcessId -Descending)) {
              try {
                taskkill /F /T /PID $proc.ProcessId | Out-Null
                Write-Host ("Stopped lingering workspace process pid={0} name={1}" -f $proc.ProcessId, $proc.Name)
              } catch {
                Write-Host ("[WARN] Failed stopping lingering workspace process pid={0}: {1}" -f $proc.ProcessId, $_.Exception.Message)
              }
            }

            if (@($matches).Count -gt 0) {
              Start-Sleep -Seconds 2
            }
          }

          git -C $source cat-file -e "$sha^{commit}"
          if ($LASTEXITCODE -ne 0) {
            throw "Local mirror is missing commit $sha"
          }

          $existingWorktree = $null
          foreach ($line in (git -C $source worktree list --porcelain)) {
            if ($line -notlike "worktree *") { continue }
            $candidatePath = $line.Substring(9).Trim()
            $normalizedCandidate = [System.IO.Path]::GetFullPath(($candidatePath -replace "/", "\"))
            if ([string]::Equals($normalizedCandidate, $normalizedDest, [System.StringComparison]::OrdinalIgnoreCase)) {
              $existingWorktree = $candidatePath
              break
            }
          }

          if ($existingWorktree -or (Test-Path $dest)) {
            Stop-PortListeners @(18080, 18081, 18082)
            Stop-WorkspaceProcesses -WorkspaceRoot $dest
          }

          if ($existingWorktree) {
            git -C $source worktree remove --force $existingWorktree | Out-Null
          }

          git -C $source worktree prune

          if (Test-Path $dest) {
            Stop-PortListeners @(18080, 18081, 18082)
            Stop-WorkspaceProcesses -WorkspaceRoot $dest
            Remove-Item -Recurse -Force $dest
          }

          git -C $source worktree add --force $dest $sha

      - name: Verify tools
        shell: powershell
        run: |
          foreach ($cmd in @("powershell","python","cargo")) {
            if (-not (Get-Command $cmd -ErrorAction SilentlyContinue)) {
              throw "$cmd not found in PATH"
            }
          }

      - name: Install glue-python dependencies
        shell: powershell
        run: |
          Set-Location .\apps\glue-python
          python -m pip install --upgrade pip
          if (Test-Path .\requirements.txt) {
            python -m pip install -r .\requirements.txt
          }

      - name: Resolve self-hosted env file
        id: resolve-env
        shell: powershell
        run: |
          $requestedEnv = "${{ github.event.inputs.env_file }}"
          if ($requestedEnv -and $requestedEnv.Trim().Length -gt 0) {
            $resolved = $requestedEnv.Trim()
            if (-not [System.IO.Path]::IsPathRooted($resolved)) {
              $resolved = Join-Path $env:GITHUB_WORKSPACE $resolved
            }
            if (-not (Test-Path $resolved)) {
              throw "env file not found: $resolved"
            }
          } else {
            $workspaceEnv = Join-Path $env:GITHUB_WORKSPACE "ops\config\dev.env"
            $mirrorEnv = "D:\AIWF\ops\config\dev.env"
            if (Test-Path $workspaceEnv) {
              $resolved = $workspaceEnv
            } elseif (Test-Path $mirrorEnv) {
              $resolved = Join-Path $env:RUNNER_TEMP "aiwf-self-hosted.env"
              $workspaceBus = Join-Path $env:GITHUB_WORKSPACE "bus"
              $workspaceLake = Join-Path $env:GITHUB_WORKSPACE "lake"
              $overrides = @{
                "AIWF_ROOT" = $env:GITHUB_WORKSPACE
                "AIWF_BUS" = $workspaceBus
                "AIWF_LAKE" = $workspaceLake
              }
              $lines = Get-Content $mirrorEnv
              $written = New-Object System.Collections.Generic.List[string]
              foreach ($line in $lines) {
                $trimmed = $line.Trim()
                if ($trimmed -eq "" -or $trimmed.StartsWith("#") -or -not ($line.Contains("="))) {
                  $written.Add($line)
                  continue
                }
                $idx = $line.IndexOf("=")
                $key = $line.Substring(0, $idx).Trim()
                if ($overrides.ContainsKey($key)) {
                  $written.Add($key + "=" + $overrides[$key])
                } else {
                  $written.Add($line)
                }
              }
              New-Item -ItemType Directory -Force -Path (Split-Path -Parent $resolved) | Out-Null
              foreach ($dir in @($workspaceBus, $workspaceLake)) {
                New-Item -ItemType Directory -Force -Path $dir | Out-Null
              }
              $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
              [System.IO.File]::WriteAllLines($resolved, $written, $utf8NoBom)
            } else {
              $resolved = ""
            }
          }

          if ($resolved) {
            Write-Host "Resolved env file: $resolved"
          } else {
            Write-Host "[WARN] no env file resolved; CI will use script defaults"
          }

          "env_file=$resolved" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Run selected local CI profile
        id: run-ci
        shell: powershell
        run: |
          $eventName = "${{ github.event_name }}"
          $isSchedule = $eventName -eq "schedule"

          $owner = "${{ github.event.inputs.owner }}"
          if (-not $owner -or $owner.Trim().Length -eq 0) {
            $owner = if ($isSchedule) { "nightly" } else { "ci" }
          }

          $envFile = "${{ steps.resolve-env.outputs.env_file }}"

          $profile = "${{ github.event.inputs.ci_profile }}"
          if (-not $profile -or $profile.Trim().Length -eq 0) {
            $profile = "Full"
          }

          $logDir = Join-Path $env:GITHUB_WORKSPACE "ops\logs\ci"
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          $ciLog = Join-Path $logDir ("self_hosted_full_{0}.transcript.log" -f (Get-Date -Format "yyyyMMdd_HHmmss"))
          "ci_log=$ciLog" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          $full = "${{ github.event.inputs.run_full_integration }}"
          if (-not $full -or $full.Trim().Length -eq 0) {
            $full = if ($isSchedule) { "true" } else { "false" }
          }

          $ciArgs = @(
            "-ExecutionPolicy", "Bypass",
            "-File", ".\ops\scripts\ci_check.ps1",
            "-Owner", $owner,
            "-CiProfile", $profile
          )

          if ($envFile -and $envFile.Trim().Length -gt 0) {
            $ciArgs += @("-EnvFile", $envFile)
          }

          if ($full -ne "true") {
            $ciArgs += "-SkipSmoke"
          }

          $ciExitCode = 0
          Start-Transcript -Path $ciLog -Force | Out-Null
          try {
            & powershell @ciArgs
            $ciExitCode = $LASTEXITCODE
          }
          finally {
            try {
              Stop-Transcript | Out-Null
            } catch {
              Write-Host ("[WARN] stop transcript failed: {0}" -f $_.Exception.Message)
            }
          }

          if ($ciExitCode -ne 0) {
            exit $ciExitCode
          }
          Write-Host ("CI transcript saved to {0}" -f $ciLog)

      - name: Report CI transcript path
        if: always()
        shell: powershell
        run: |
          $ciLog = "${{ steps.run-ci.outputs.ci_log }}"
          if (-not $ciLog -or $ciLog.Trim().Length -eq 0) {
            Write-Host "[WARN] no CI transcript path was reported"
            exit 0
          }

          if (-not (Test-Path $ciLog)) {
            Write-Host ("[WARN] CI transcript not found: {0}" -f $ciLog)
            exit 0
          }

          $item = Get-Item $ciLog
          Write-Host ("CI transcript: {0} ({1} bytes)" -f $item.FullName, $item.Length)

      - name: Emit failure diagnostics
        if: failure()
        shell: powershell
        run: |
          $paths = @(
            "${{ steps.run-ci.outputs.ci_log }}",
            (Join-Path $env:GITHUB_WORKSPACE "ops\logs\ci"),
            (Join-Path $env:GITHUB_WORKSPACE "ops\logs\acceptance"),
            (Join-Path $env:GITHUB_WORKSPACE "ops\logs\regression"),
            (Join-Path $env:GITHUB_WORKSPACE "ops\logs\perf"),
            (Join-Path $env:GITHUB_WORKSPACE "ops\logs\route_bench"),
            "D:\actions-runner\aiwf-full\_diag"
          ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

          foreach ($path in $paths) {
            if (-not (Test-Path $path)) {
              Write-Host ("[WARN] diagnostic path not found: {0}" -f $path)
              continue
            }

            $item = Get-Item $path
            if ($item.PSIsContainer) {
              Write-Host ("[INFO] diagnostic directory: {0}" -f $item.FullName)
              Get-ChildItem -Path $item.FullName -Recurse -File -ErrorAction SilentlyContinue |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 20 FullName, Length, LastWriteTime |
                Format-Table -AutoSize | Out-String -Width 220 | Write-Host
              continue
            }

            Write-Host ("[INFO] diagnostic file tail: {0}" -f $item.FullName)
            Get-Content -Path $item.FullName -Tail 120 -ErrorAction SilentlyContinue | Write-Host
          }
